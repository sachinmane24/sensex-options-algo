version: '3.9'

services:
  backend:
    build: ./backend
    ports:
      - '8000:8000'

  redis:
    image: redis:7
    ports:
      - '6379:6379'

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sensex_algo
    ports:
      - '5432:5432'
